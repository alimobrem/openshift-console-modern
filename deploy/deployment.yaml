apiVersion: v1
kind: Namespace
metadata:
  name: openshiftpulse
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
---
# The SA only needs minimal permissions. User actions are authorized by the
# forwarded OAuth token (X-Forwarded-Access-Token), NOT by the SA. The SA
# serves as pod identity and lets the OAuth proxy start/validate tokens.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openshiftpulse-reader
rules:
# Core resources — read-only
- apiGroups: [""]
  resources:
  - configmaps
  - endpoints
  - events
  - namespaces
  - nodes
  - persistentvolumeclaims
  - persistentvolumes
  - pods
  - pods/log
  - replicationcontrollers
  - resourcequotas
  - secrets
  - serviceaccounts
  - services
  verbs: [get, list, watch]
# Apps
- apiGroups: [apps]
  resources: [daemonsets, deployments, replicasets, statefulsets]
  verbs: [get, list, watch]
# Batch
- apiGroups: [batch]
  resources: [cronjobs, jobs]
  verbs: [get, list, watch]
# Autoscaling
- apiGroups: [autoscaling]
  resources: [horizontalpodautoscalers]
  verbs: [get, list, watch]
# Networking
- apiGroups: [networking.k8s.io]
  resources: [ingresses, networkpolicies]
  verbs: [get, list, watch]
# Storage
- apiGroups: [storage.k8s.io]
  resources: [storageclasses]
  verbs: [get, list, watch]
# RBAC
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterroles, clusterrolebindings, roles, rolebindings]
  verbs: [get, list, watch]
# CRDs (for CRD browser)
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [get, list, watch]
# OpenShift-specific
- apiGroups: [route.openshift.io]
  resources: [routes]
  verbs: [get, list, watch]
- apiGroups: [build.openshift.io]
  resources: [buildconfigs, builds]
  verbs: [get, list, watch]
- apiGroups: [image.openshift.io]
  resources: [imagestreams]
  verbs: [get, list, watch]
- apiGroups: [config.openshift.io]
  resources: [clusterversions, infrastructures]
  verbs: [get, list, watch]
- apiGroups: [operators.coreos.com]
  resources: [clusterserviceversions, subscriptions, catalogsources, installplans, operatorgroups]
  verbs: [get, list, watch]
# API discovery (needed for CRD browser and resource discovery)
- apiGroups: [""]
  resources: [componentstatuses]
  verbs: [get, list]
- nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/version"]
  verbs: [get]
# OAuth proxy needs these to validate tokens and authorize requests
- apiGroups: [authentication.k8s.io]
  resources: [tokenreviews]
  verbs: [create]
- apiGroups: [authorization.k8s.io]
  resources: [subjectaccessreviews]
  verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshiftpulse-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshiftpulse-reader
subjects:
- kind: ServiceAccount
  name: openshiftpulse
  namespace: openshiftpulse
---
# Role for the SA's own namespace resources
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshiftpulse-ns
  namespace: openshiftpulse
rules:
- apiGroups: [""]
  resources: [configmaps, secrets]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshiftpulse-ns
  namespace: openshiftpulse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshiftpulse-ns
subjects:
- kind: ServiceAccount
  name: openshiftpulse
  namespace: openshiftpulse
---
# Generate secrets before applying:
#   openssl rand -base64 32 | tr -d '\n' > /tmp/oauth-client-secret
#   openssl rand -hex 16 > /tmp/cookie-secret  (must be exactly 16, 24, or 32 bytes)
#   oc create secret generic openshiftpulse-oauth-secrets \
#     --from-file=client-secret=/tmp/oauth-client-secret \
#     --from-file=cookie-secret=/tmp/cookie-secret \
#     -n openshiftpulse
#   Then update the OAuthClient: oc patch oauthclient openshiftpulse \
#     -p "{\"secret\":\"$(cat /tmp/oauth-client-secret)\"}"
apiVersion: v1
kind: Secret
metadata:
  name: openshiftpulse-oauth-secrets
  namespace: openshiftpulse
type: Opaque
stringData:
  # REPLACE these with real generated values before deploying
  client-secret: REPLACE_ME_WITH_GENERATED_SECRET
  cookie-secret: REPLACE_ME_WITH_GENERATED_SECRET
---
apiVersion: oauth.openshift.io/v1
kind: OAuthClient
metadata:
  name: openshiftpulse
grantMethod: auto
# The secret value must match the client-secret key in the openshiftpulse-oauth-secrets Secret.
# After creating the Secret, patch this: oc patch oauthclient openshiftpulse -p '{"secret":"<value>"}'
secret: REPLACE_ME_WITH_GENERATED_SECRET
redirectURIs:
# Replace with your cluster's route URL after deploy:
#   oc patch oauthclient openshiftpulse --type merge \
#     -p "{\"redirectURIs\":[\"https://$(oc get route openshiftpulse -n openshiftpulse -o jsonpath='{.spec.host}')/oauth/callback\"]}"
- https://REPLACE_WITH_CLUSTER_ROUTE/oauth/callback
scopeRestrictions:
- literals:
  - user:full
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshiftpulse-nginx
  namespace: openshiftpulse
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;
      # WebSocket upgrade mapping for exec/attach
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 8080;
        server_name _;
        root /opt/app-root/src;
        index index.html;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Proxy K8s API — use the user's OAuth token passed by oauth-proxy
        # Supports WebSocket upgrade for exec/attach/port-forward
        location /api/kubernetes/ {
          proxy_pass https://kubernetes.default.svc/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_http_version 1.1;
          proxy_read_timeout 3600s;
        }

        # Proxy Prometheus (uses service-ca signed certs)
        location /api/prometheus/ {
          proxy_pass https://thanos-querier.openshift-monitoring.svc:9091/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 60s;
        }

        # Proxy Alertmanager (uses service-ca signed certs)
        location /api/alertmanager/ {
          proxy_pass https://alertmanager-main.openshift-monitoring.svc:9094/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_read_timeout 60s;
        }

        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: openshiftpulse
  template:
    metadata:
      labels:
        app: openshiftpulse
    spec:
      serviceAccountName: openshiftpulse
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: openshiftpulse
      containers:
      # OAuth Proxy sidecar — handles user login
      # user:full scope is required because the app performs write operations
      # (create, update, delete, scale, patch) on behalf of the authenticated user.
      - name: oauth-proxy
        image: registry.redhat.io/openshift4/ose-oauth-proxy:v4.17
        args:
        - --https-address=:8443
        - --provider=openshift
        - --client-id=openshiftpulse
        - --client-secret-file=/etc/oauth/client-secret
        - --upstream=http://localhost:8080
        - --tls-cert=/etc/tls/private/tls.crt
        - --tls-key=/etc/tls/private/tls.key
        - --cookie-secret-file=/etc/oauth/cookie-secret
        - --pass-access-token=true
        - --pass-basic-auth=false
        - --scope=user:full
        - --openshift-delegate-urls={"/api/kubernetes/":{"resource":"namespaces","verb":"list"}}
        ports:
        - containerPort: 8443
          name: https
        volumeMounts:
        - name: proxy-tls
          mountPath: /etc/tls/private
        - name: oauth-secrets
          mountPath: /etc/oauth
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
      # OpenShift Pulse app — serves static files + reverse proxies API
      - name: openshiftpulse
        image: image-registry.openshift-image-registry.svc:5000/openshiftpulse/openshiftpulse:latest
        command: ["nginx", "-g", "daemon off;"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-log
          mountPath: /var/log/nginx
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
      volumes:
      - name: proxy-tls
        secret:
          secretName: openshiftpulse-proxy-tls
      - name: oauth-secrets
        secret:
          secretName: openshiftpulse-oauth-secrets
      - name: nginx-config
        configMap:
          name: openshiftpulse-nginx
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-log
        emptyDir: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: openshiftpulse
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
spec:
  hard:
    pods: "10"
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    persistentvolumeclaims: "0"
    secrets: "20"
    configmaps: "50"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
spec:
  limits:
  - type: Container
    default:
      cpu: 200m
      memory: 256Mi
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    max:
      cpu: "1"
      memory: 1Gi
  - type: Pod
    max:
      cpu: "2"
      memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: openshiftpulse-proxy-tls
spec:
  selector:
    app: openshiftpulse
  ports:
  - name: https
    port: 8443
    targetPort: 8443
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: openshiftpulse
  namespace: openshiftpulse
  labels:
    app: openshiftpulse
spec:
  to:
    kind: Service
    name: openshiftpulse
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
