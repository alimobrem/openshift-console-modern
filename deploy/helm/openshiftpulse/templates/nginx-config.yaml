apiVersion: v1
kind: ConfigMap
metadata:
  name: openshiftpulse-nginx
  namespace: {{ include "openshiftpulse.namespace" . }}
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;
      sendfile on;
      keepalive_timeout 65;
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      server {
        listen 8080;
        server_name _;
        root /opt/app-root/src;
        index index.html;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' wss: https://api.github.com https://gitlab.com https://api.bitbucket.org; font-src 'self' https://fonts.gstatic.com" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /api/kubernetes/ {
          proxy_pass https://kubernetes.default.svc/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/ca.crt;
          proxy_set_header Authorization "Bearer $http_x_forwarded_access_token";
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_http_version 1.1;
          proxy_read_timeout 3600s;
        }

        {{- if .Values.monitoring.prometheus.enabled }}
        location /api/prometheus/ {
          proxy_pass https://{{ .Values.monitoring.prometheus.host }}/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt;
          # Try user OAuth token first, fall back to SA token (set by entrypoint)
          set $prom_token $http_x_forwarded_access_token;
          if ($prom_token = '') {
            set $prom_token '__SA_TOKEN__';
          }
          proxy_set_header Authorization "Bearer $prom_token";
          proxy_read_timeout 60s;
        }
        {{- else }}
        location /api/prometheus/ {
          return 503 '{"error":"Prometheus not configured","detail":"Set monitoring.prometheus.enabled=true in Helm values"}';
          add_header Content-Type application/json;
        }
        {{- end }}

        {{- if .Values.monitoring.alertmanager.enabled }}
        location /api/alertmanager/ {
          proxy_pass https://{{ .Values.monitoring.alertmanager.host }}/;
          proxy_ssl_verify on;
          proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt;
          set $am_token $http_x_forwarded_access_token;
          if ($am_token = '') {
            set $am_token '__SA_TOKEN__';
          }
          proxy_set_header Authorization "Bearer $am_token";
          proxy_read_timeout 60s;
        }
        {{- else }}
        location /api/alertmanager/ {
          return 503 '{"error":"Alertmanager not configured","detail":"Set monitoring.alertmanager.enabled=true in Helm values"}';
          add_header Content-Type application/json;
        }
        {{- end }}

        {{- if .Values.agent.enabled }}
        location ~ ^/api/agent/ws/(sre|security|monitor|agent)$ {
          proxy_pass http://{{ .Values.agent.serviceName | default (printf "%s-openshift-sre-agent" .Release.Name) }}:8080/ws/$1?token=__AGENT_TOKEN__;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Forwarded-Access-Token $http_x_forwarded_access_token;
          proxy_set_header X-Forwarded-User $http_x_forwarded_user;
          proxy_http_version 1.1;
          proxy_read_timeout 3600s;
        }

        location /api/agent/ {
          proxy_pass http://{{ .Values.agent.serviceName | default (printf "%s-openshift-sre-agent" .Release.Name) }}:8080/;
          proxy_set_header Authorization "Bearer __AGENT_TOKEN__";
          proxy_set_header X-Forwarded-Access-Token $http_x_forwarded_access_token;
          proxy_set_header X-Forwarded-User $http_x_forwarded_user;
          proxy_read_timeout 60s;
        }
        {{- else }}
        location /api/agent/ {
          return 503 '{"error":"Agent not deployed","detail":"Deploy with --agent-repo to enable AI features"}';
          add_header Content-Type application/json;
        }
        {{- end }}

        location / { try_files $uri $uri/ /index.html; }
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }
    }
