# Minimal agent + PostgreSQL stack for E2E tests.
# Started/stopped by e2e/start-agent.sh and e2e/stop-agent.sh.
# No real Claude API needed — agent starts but AI calls return errors (acceptable for view CRUD tests).

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse-e2e
      POSTGRES_DB: pulse_agent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 3s
      timeout: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  agent:
    build:
      context: ../../pulse-agent
      dockerfile: Dockerfile.full
    environment:
      PULSE_AGENT_HOST: "0.0.0.0"
      PULSE_AGENT_PORT: "8080"
      PULSE_AGENT_WS_TOKEN: "e2e-test-token"
      PULSE_AGENT_DATABASE_URL: "postgresql://pulse:pulse-e2e@postgres:5432/pulse_agent"
      PULSE_AGENT_DRY_RUN: "true"
      PULSE_AGENT_MEMORY: "0"
      ANTHROPIC_API_KEY: "sk-ant-mock-e2e-key"
      KUBECONFIG: "/dev/null"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 5s
      timeout: 3s
      retries: 10
