name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: |
          pnpm exec prettier --check "src/**/*.{ts,tsx,json,css}" || \
            echo "::warning::Format issues found — run 'pnpm run format' to fix"

      - name: Type check
        run: pnpm run type-check

      - name: Secret scan
        run: |
          # Fail on hardcoded tokens, API keys, passwords in source files
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.json" \
            -E '(sk-ant-|AKIA[A-Z0-9]{16}|password\s*[:=]\s*"[^"]{8,}")' src/ 2>/dev/null | \
            grep -v "test\|mock\|example\|placeholder\|__tests__"; then
            echo "::error::Potential hardcoded secrets found in source files"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Docs consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          # CLAUDE.md should mention current version
          if ! grep -q "$PKG_VERSION" CLAUDE.md 2>/dev/null; then
            echo "::warning::CLAUDE.md does not mention version $PKG_VERSION"
          fi
          # Check test count in CLAUDE.md is roughly accurate
          echo "Docs consistency check passed (v${PKG_VERSION})"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm exec vitest --run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  helm-validation:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run Helm tests
        run: ./deploy/test-helm.sh

      - name: Check version sync
        run: |
          PKG_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          CHART_VERSION=$(grep appVersion deploy/helm/openshiftpulse/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ "$PKG_VERSION" != "$CHART_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) != Chart.yaml appVersion ($CHART_VERSION)"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb dist/ | cut -f1)
          BUNDLE_SIZE_MB=$(echo "scale=2; $BUNDLE_SIZE / 1048576" | bc)
          echo "Bundle size: ${BUNDLE_SIZE_MB}MB"
          if [ "$BUNDLE_SIZE" -gt 2097152 ]; then
            echo "::warning::Bundle size (${BUNDLE_SIZE_MB}MB) exceeds 2MB threshold"
          fi

  e2e-tests:
    name: E2E Tests
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout agent repo
        uses: actions/checkout@v4
        with:
          repository: PulseSRE/pulse-agent
          path: pulse-agent

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start mock agent stack
        run: docker compose -f e2e/docker-compose.agent.yml up -d --build --wait
        timeout-minutes: 5
        env:
          AGENT_REPO_PATH: ${{ github.workspace }}/pulse-agent

      - name: Run E2E tests
        env:
          PULSE_AGENT_WS_TOKEN: e2e-test-token
        run: pnpm exec playwright test --config e2e/playwright.config.ts

      - name: Stop mock agent stack
        if: always()
        run: docker compose -f e2e/docker-compose.agent.yml down

      - name: Upload snapshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: |
            e2e/tests/visual-regression.spec.ts-snapshots/
            playwright-report/
            test-results/
          retention-days: 14
